<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Assessment — Viva</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;min-height:100vh;background:linear-gradient(135deg,#0a1a0f,#0f2a18,#1a3520);color:#fff;padding:24px 16px}
  .container{max-width:600px;margin:0 auto}
  .card{background:rgba(255,255,255,0.05);border-radius:14px;padding:20px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.08)}
  input,select,textarea{width:100%;background:rgba(255,255,255,0.08);border:1px solid #374151;border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;margin-bottom:12px}
  select{background:#1f2937}
  textarea{min-height:80px;resize:vertical}
  button{border:none;border-radius:10px;padding:12px 20px;cursor:pointer;font-size:14px;font-weight:700;transition:opacity 0.2s}
  button:disabled{opacity:0.4;cursor:not-allowed}
  .btn-row{display:flex;gap:10px}
  .progress-bar{background:rgba(255,255,255,0.1);border-radius:99px;height:8px;margin-bottom:8px}
  .progress-fill{height:100%;border-radius:99px;transition:width 0.4s}
  .area-btn{width:100%;background:rgba(255,255,255,0.07);border-radius:14px;padding:18px 22px;margin-bottom:14px;cursor:pointer;display:flex;align-items:center;gap:16px;border:2px solid transparent;transition:background 0.2s}
  .area-btn:hover{background:rgba(255,255,255,0.13)}
  .area-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .option-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;cursor:pointer}
  .radio-circle{width:18px;height:18px;border-radius:50%;border:2px solid #4b5563;flex-shrink:0;margin-top:1px;transition:all 0.15s}
  .check-box{width:18px;height:18px;border-radius:4px;border:2px solid #4b5563;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
  .scale-row{display:flex;gap:8px;margin-bottom:6px}
  .scale-btn{flex:1;padding:10px 0;border-radius:8px;border:2px solid #374151;background:rgba(255,255,255,0.05);color:#fff;font-weight:700;cursor:pointer;font-size:15px;transition:all 0.15s}
  .section-header{border-radius:12px;padding:12px 16px;margin-bottom:20px}
  .badge{border-radius:6px;padding:2px 10px;font-size:12px;font-weight:700;color:#fff}
  #admin-panel table{width:100%;border-collapse:collapse;font-size:13px}
  #admin-panel th{background:rgba(255,255,255,0.1);padding:10px;text-align:left;color:#9ca3af;font-size:11px;text-transform:uppercase;letter-spacing:1px}
  #admin-panel td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.06);color:#e5e7eb;vertical-align:top}
  .filter-btn{padding:7px 14px;border-radius:8px;border:1px solid #374151;background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;font-size:12px}
  .filter-btn.active{border-color:#22c55e;background:#22c55e}
  .report-bar-bg{background:rgba(255,255,255,0.1);border-radius:99px;height:10px;flex:1}
  .report-bar-fill{height:100%;border-radius:99px;transition:width 0.6s}
  .ai-block{background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;margin-top:12px;border:1px solid rgba(255,255,255,0.1);white-space:pre-wrap;font-size:13px;line-height:1.7;color:#d1fae5}
  .spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,0.2);border-top-color:#22c55e;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>

    {id:"u6",text:"¿Cuáles de estos plugins o herramientas de IA usas dentro de Figma?",type:"multi",options:["Figma AI (generación de layers o contenido)","Magician","Automator","Plugins de generación de imágenes","No uso plugins de IA en Figma","No sabía que existían"],scores:[2,2,2,2,0,0]},

  { title:"Visión Futura sobre IA en Diseño", questions:[

function classify(score,max){
  const p=score/max;
  if(p<0.4)return"Junior";
  if(p<0.7)return"Mid";
  return"Senior";
}

function maxScore(sections){
  let m=0;
  sections.forEach(s=>s.questions.forEach(q=>{
    if(q.type==="open"||!q.scores)return;
    if(q.type==="scale")m+=3;
    else if(q.type==="multi")m+=Math.max(...q.scores)*2;
    else m+=Math.max(...q.scores);
  }));
  return m||1;
}

function calcScore(sections,answers){
  let s=0;
  sections.forEach(sec=>sec.questions.forEach(q=>{
    if(q.type==="open"||!q.scores)return;
    const a=answers[q.id];
    if(a===undefined||a===null)return;
    if(q.type==="scale")s+=(a-1);
    else if(q.type==="multi")a.forEach(i=>s+=(q.scores[i]||0));
    else s+=(q.scores[a]||0);
  }));
  return s;
}

function calcSectionScores(sections,answers){
  return sections.map(sec=>{
    let s=0,m=0;
    sec.questions.forEach(q=>{
      if(q.type==="open"||!q.scores)return;
      if(q.type==="scale"){
        m+=3;
        const a=answers[q.id];
        if(a!==undefined)s+=(a-1);
      } else if(q.type==="multi"){
        const mx=Math.max(...q.scores);
        m+=mx; // max posible = el score más alto de esa pregunta
        const a=answers[q.id]||[];
        const gained=a.reduce((acc,i)=>acc+(q.scores[i]||0),0);
        s+=Math.min(gained,mx); // cap al máximo de esa pregunta
      } else {
        m+=Math.max(...q.scores);
        const a=answers[q.id];
        if(a!==undefined)s+=(q.scores[a]||0);
      }
    });
    const pct=m>0?Math.min(Math.round(s/m*100),100):0;
    return{title:sec.title,score:s,max:m||1,pct};
  });
}

function isSectionComplete(){
  const qs=getSections()[state.section].questions;
  for(const q of qs){
    if(q.type==="open")continue;
    const a=state.answers[q.id];
    if(a===undefined||a===null)return false;
    if(q.type==="multi"&&a.length===0)return false;
  }
  return true;
}

function getTotalQuestions(){
  return getSections().reduce((acc,s)=>acc+s.questions.length,0);
}

function getAnsweredUpToSection(){
  let count=0;
  getSections().forEach((s,si)=>{
    if(si<state.section)count+=s.questions.length;
  });
  return count;
}

async function generateReport(result,sections,answers){
  const sectionScores=calcSectionScores(sections,answers);
  const sorted=[...sectionScores].sort((a,b)=>b.pct-a.pct);
  const strong=sorted.slice(0,2).map(s=>s.title).join(", ");
  const opportunity=sorted.slice(-2).map(s=>s.title).join(", ");
  const openAnswer=Object.values(result.openAnswers).filter(Boolean).join(". ");
  const vivaAns=(answers["viva_apoyo"]||[]).map(i=>vivaApoyoQuestion.options[i]).join(", ");

  const prompt=`Eres un coach de IA interno de Viva Aerobus, una aerolínea digital mexicana con un equipo joven y dinámico. Tu tono es una mezcla de: mentor cercano, compañero de equipo y speaker inspiracional. Usas español neutro, eres directo, cálido y motivador. Nunca eres genérico.

La persona que completó el assessment se llama ${result.name}, trabaja en el área de ${result.area}${result.role?" como "+result.role:""}.

Sus áreas más fuertes son: ${strong}.
Sus áreas de mayor oportunidad son: ${opportunity}.
Lo que quiere automatizar o mejorar con IA: "${openAnswer}".
Cómo le gustaría que Viva lo apoye: ${vivaAns}.

Genera una respuesta en 3 bloques claramente separados con estos encabezados exactos:

### 💪 Tus fortalezas en IA
2-3 oraciones reconociendo genuinamente lo que ya hace bien, con ejemplos concretos de su área.

### 🚀 Tu mayor oportunidad
2-3 oraciones específicas sobre qué puede mejorar y por qué importa para su rol en Viva. Sé concreto, no genérico.

### 🗺️ Tu plan de desarrollo personalizado
Un plan con 4 pasos concretos y accionables, cada uno con:
- Qué hacer
- Una herramienta o recurso específico y gratuito (con nombre real)
- Por qué le va a servir en su trabajo en Viva

Termina con una frase corta de cierre motivacional dirigida a ${result.name} por su nombre.`;

  const res=await fetch(CLAUDE_API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1000,
      messages:[{role:"user",content:prompt}]
    })
  });
  const data=await res.json();
  return data.content?.[0]?.text||"No se pudo generar el reporte.";
}

function exportCSV(){
  const rows=state.results;
  const headers=["Fecha","Área","Rol","Nombre","Email","Score","Score Máximo","Porcentaje","Nivel","Se postula","Idea","Viva apoyo"];
  const data=rows.map(r=>[r.date,r.area,r.role,r.name,r.email,r.score,r.max,r.porcentaje,r.level,r.sePostula||"",r.ideaPostulacion||"",r.vivaApoyo||""]
    .map(v=>`"${String(v||"").replace(/"/g,'""')}"`));
  const csv="\uFEFF"+[headers.join(","),...data.map(r=>r.join(","))].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
  a.download=`assessment_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function renderQuestion(q,qi,color){

        <span style="color:${sel?"#fff":"#9ca3af"};font-size:13px;line-height:1.4">${opt}</span>
      </div>`;
    }).join("");
  }else if(q.type==="multi"){
    inner=q.options.map((opt,oi)=>{
      const sel=(state.answers[q.id]||[]).includes(oi);
      return`<div class="option-row" data-qid="${q.id}" data-val="${oi}" data-type="multi">
        <div class="check-box" style="border-color:${sel?color:"#4b5563"};background:${sel?color:"transparent"}">${sel?'<span style="color:#fff;font-size:11px;font-weight:700">✓</span>':""}</div>
        <span style="color:${sel?"#fff":"#9ca3af"};font-size:13px;line-height:1.4">${opt}</span>
      </div>`;
    }).join("");
  }else if(q.type==="scale"){
    const btns=[1,2,3,4,5].map(v=>{
      const sel=state.answers[q.id]===v;
      return`<button class="scale-btn" data-qid="${q.id}" data-val="${v}" data-type="scale" style="border-color:${sel?color:"#374151"};background:${sel?color:"rgba(255,255,255,0.05)"}">${v}</button>`;
    }).join("");
    inner=`<div class="scale-row">${btns}</div><div style="color:#6b7280;font-size:11px">${q.label}</div>`;
  }else if(q.type==="open"){
    inner=`<textarea data-qid="${q.id}" data-type="open" placeholder="Escribe tu respuesta aquí...">${state.answers[q.id]||""}</textarea>`;
  }
  return`<div class="card">
    <div style="color:#e5e7eb;font-weight:600;margin-bottom:14px;font-size:14px;line-height:1.5">
      <span style="color:${color};margin-right:8px">${qi+1}.</span>${q.text}
    </div>${inner}</div>`;
}

function renderReport(){
  const a=areas[state.area];
  const r=state.report;
  if(!r)return`<div style="text-align:center;padding-top:80px"><div class="spinner"></div><p style="color:#9ca3af;margin-top:16px">Generando tu reporte personalizado...</p></div>`;

  const sections=getSections();
  const sectionScores=calcSectionScores(sections,state.answers);
  const sorted=[...sectionScores].sort((a,b)=>b.pct-a.pct);

  const aiText=r.aiReport||"";
  const blocks=aiText.split(/###/).filter(Boolean).map(b=>b.trim());

  return`<div style="max-width:620px;margin:0 auto;padding:24px 0 40px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:48px;margin-bottom:8px">🙌</div>
      <h2 style="font-size:22px;font-weight:800;margin-bottom:6px">¡Listo, ${state.user.name}!</h2>
      <p style="color:#bbf7d0;font-size:14px">Aquí está tu reporte personalizado de IA</p>
    </div>

    <!-- Barras por sección -->
    <div class="card">
      <div style="font-weight:700;font-size:15px;margin-bottom:16px;color:${a.color}">📊 Tu perfil por área</div>
      ${sorted.map(s=>`
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
            <span style="color:#e5e7eb">${s.title}</span>
            <span style="color:${s.pct>=70?"#22c55e":s.pct>=40?"#f59e0b":"#ef4444"};font-weight:700">${s.pct}%</span>
          </div>
          <div class="report-bar-bg"><div class="report-bar-fill" style="width:${s.pct}%;background:${s.pct>=70?"#22c55e":s.pct>=40?"#f59e0b":"#ef4444"}"></div></div>
        </div>`).join("")}
      <div style="display:flex;gap:16px;margin-top:12px;font-size:11px;color:#6b7280">
        <span>🟢 Fortaleza (≥70%)</span>
        <span>🟡 En desarrollo (40-69%)</span>
        <span>🔴 Oportunidad (&lt;40%)</span>
      </div>
    </div>

    <!-- Reporte IA -->
    ${blocks.map(block=>{
      const lines=block.split("\n");
      const title=lines[0];
      const body=lines.slice(1).join("\n").trim();
      return`<div class="card" style="border-color:${a.color}33">
        <div style="font-weight:700;font-size:15px;margin-bottom:10px;color:${a.color}">### ${title}</div>
        <div style="font-size:13px;line-height:1.8;color:#d1fae5;white-space:pre-wrap">${body}</div>
      </div>`;
    }).join("")}

    <button id="back-home-done" style="width:100%;background:${a.color};color:#fff;border:none;border-radius:10px;padding:14px;cursor:pointer;font-size:15px;font-weight:700;margin-top:8px">Volver al inicio</button>
  </div>`;
}

function renderAdmin(){
  if(!state.adminUnlocked)return`<div style="max-width:360px;margin:80px auto">
    <div class="card" style="text-align:center;border-color:#374151">
      <div style="font-size:36px;margin-bottom:12px">🔐</div>
      <h2 style="margin-bottom:20px;font-size:18px">Acceso Administrador</h2>
      <input id="admin-pw" type="password" placeholder="Contraseña"/>
      <div id="admin-err" style="color:#ef4444;font-size:13px;margin-bottom:10px;display:none">Contraseña incorrecta</div>
      <div class="btn-row">
        <button style="flex:1;background:rgba(255,255,255,0.07);border:1px solid #374151;color:#9ca3af;border-radius:10px;padding:12px;cursor:pointer" id="back-home-admin">Cancelar</button>
        <button id="admin-login" style="flex:2;background:#16a34a;color:#fff;border:none;border-radius:10px;padding:12px;cursor:pointer;font-weight:700">Ingresar</button>
      </div>
    </div>
  </div>`;

  const filtered=state.adminFilter==="all"?state.results:state.results.filter(r=>r.areaKey===state.adminFilter);
  const lc={Junior:"#ef4444",Mid:"#f59e0b",Senior:"#10b981"};
  return`<div id="admin-panel" style="max-width:960px;margin:0 auto;padding-top:24px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px">
      <div>
        <h2 style="font-size:20px;font-weight:800;margin-bottom:4px">📊 Panel de Resultados</h2>
        <p style="color:#9ca3af;font-size:13px">${filtered.length} respuesta(s)</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${filtered.length>0?`<button id="export-btn" style="background:#10b981;border:none;color:#fff;border-radius:10px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:700">📥 Exportar CSV</button>`:""}
        <button id="back-home-admin2" style="background:rgba(255,255,255,0.07);border:1px solid #374151;color:#9ca3af;border-radius:10px;padding:10px 16px;cursor:pointer;font-size:13px">← Salir</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
      ${[["all","Todas"],["producto","Producto"],["crm","Email/CRM"],["tech","Tech"],["personalizacion","Personalización"]].map(([k,l])=>`
        <button class="filter-btn ${state.adminFilter===k?"active":""}" data-filter="${k}">${l}</button>`).join("")}
    </div>
    ${filtered.length===0?`<div style="text-align:center;padding:60px;color:#6b7280"><div style="font-size:48px;margin-bottom:12px">📭</div><p>No hay respuestas aún.</p></div>`:`
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Fecha</th><th>Área</th><th>Rol</th><th>Nombre</th><th>Email</th><th>Score</th><th>Nivel</th><th>¿Se postula?</th></tr></thead>
      <tbody>
        ${filtered.slice().reverse().map(r=>`<tr>
          <td style="color:#9ca3af;font-size:12px;white-space:nowrap">${r.date}</td>
          <td><span style="color:${areas[r.areaKey]?.color||"#fff"};font-size:12px;font-weight:600">${r.area}</span></td>
          <td style="color:#9ca3af;font-size:12px">${r.role}</td>
          <td style="font-weight:600">${r.name}</td>
          <td style="color:#9ca3af;font-size:12px">${r.email}</td>
          <td style="white-space:nowrap">${r.score}/${r.max}<br><span style="color:#6b7280;font-size:11px">${r.porcentaje}</span></td>
          <td><span class="badge" style="background:${lc[r.level]}">${r.level}</span></td>
          <td style="font-size:12px">${r.sePostula||""}<br><span style="color:#6b7280">${r.ideaPostulacion||""}</span></td>
        </tr>`).join("")}
      </tbody>
    </table></div>`}
  </div>`;
}

function bindEvents(){
  document.querySelectorAll(".area-btn").forEach(btn=>{
    btn.onclick=()=>{state.area=btn.dataset.area;state.answers={};state.section=0;state.user={name:"",email:"",role:""};state.screen="form";render();};
  });
  const adminBtn=document.getElementById("admin-btn");
  if(adminBtn)adminBtn.onclick=()=>{state.screen="admin";render();};

  const inpName=document.getElementById("inp-name");
  const inpEmail=document.getElementById("inp-email");
  const inpRole=document.getElementById("inp-role");
  const startBtn=document.getElementById("start-btn");
  if(inpName){
    const chk=()=>{
      state.user.name=inpName.value;state.user.email=inpEmail.value;state.user.role=inpRole.value;
      const ok=state.user.name&&state.user.email&&(state.user.role||!areas[state.area].roles.length);
      startBtn.disabled=!ok;startBtn.style.background=ok?areas[state.area].color:"#374151";
    };
    inpName.oninput=chk;inpEmail.oninput=chk;inpRole.onchange=chk;
    startBtn.onclick=()=>{if(!startBtn.disabled){state.screen="section";render();}};
  }
  const backHome=document.getElementById("back-home");
  if(backHome)backHome.onclick=()=>{state.screen="home";render();};

  document.querySelectorAll(".option-row").forEach(row=>{
    row.onclick=()=>{
      const{qid,val,type}=row.dataset;const v=parseInt(val);
      if(type==="multi"){const prev=state.answers[qid]||[];const idx=prev.indexOf(v);state.answers[qid]=idx>=0?prev.filter(x=>x!==v):[...prev,v];}
      else state.answers[qid]=v;
      render();
    };
  });
  document.querySelectorAll(".scale-btn").forEach(btn=>{
    btn.onclick=()=>{state.answers[btn.dataset.qid]=parseInt(btn.dataset.val);render();};
  });
  document.querySelectorAll("textarea[data-type='open']").forEach(ta=>{
    ta.oninput=()=>{state.answers[ta.dataset.qid]=ta.value;};
  });

  const prevBtn=document.getElementById("prev-btn");
  if(prevBtn)prevBtn.onclick=()=>{state.section>0?state.section--:state.screen="form";render();};

  const nextBtn=document.getElementById("next-btn");
  if(nextBtn)nextBtn.onclick=()=>{
    if(nextBtn.disabled)return;
    const a=areas[state.area];
    const sections=getSections();
    if(state.section<sections.length-1){state.section++;render();}
    else{
      const score=calcScore(sections,state.answers);
      const max=maxScore(sections);
      const level=classify(score,max);
      const openAnswers={};
      sections.forEach(s=>s.questions.forEach(q=>{if(q.type==="open")openAnswers[q.id]=state.answers[q.id]||"";}));
      const postulacionIdx=state.answers["postulacion"];
      const postulacionOpts=["Sí, me encantaría compartirlo","Tal vez, dependiendo del formato","No por ahora"];
      const sePostula=postulacionIdx!==undefined?postulacionOpts[postulacionIdx]:"";
      const ideaPostulacion=state.answers["postulacion_open"]||"";
      const vivaAns=(state.answers["viva_apoyo"]||[]).map(i=>vivaApoyoQuestion.options[i]).join(" | ");

      const result={
        id:Date.now(),date:new Date().toLocaleString("es-MX"),
        area:a.label,areaKey:state.area,
        name:state.user.name,email:state.user.email,role:state.user.role,
        score,max,porcentaje:`${Math.round(score/max*100)}%`,level,
        sePostula,ideaPostulacion,vivaApoyo:vivaAns,openAnswers,answers:{...state.answers}
      };
      state.results.push(result);save();

      // Send to Google Sheets
      const payload={fecha:result.date,area:result.area,rol:result.role,nombre:result.name,email:result.email,score:result.score,scoreMax:result.max,porcentaje:result.porcentaje,nivel:result.level,sePostula,ideaPostulacion,vivaApoyo:vivaAns};
      sections.forEach(sec=>sec.questions.forEach(q=>{
        if(["postulacion","postulacion_open","viva_apoyo"].includes(q.id))return;
        const ans=state.answers[q.id];let readable="";
        if(q.type==="open")readable=ans||"";
        else if(q.type==="single"&&ans!==undefined)readable=q.options[ans]||"";
        else if(q.type==="scale"&&ans!==undefined)readable=String(ans);
        else if(q.type==="multi"&&ans&&ans.length>0)readable=ans.map(i=>q.options[i]).join(" | ");
        payload[q.text.slice(0,60).replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ0-9\s]/g,"").trim()]=readable;
      }));
      fetch(GOOGLE_SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}).catch(e=>console.error(e));

      // Show report screen and generate AI report
      state.report={sectionScores:calcSectionScores(sections,state.answers),aiReport:null};
      state.screen="report";render();

      generateReport(result,sections,state.answers).then(aiText=>{
        state.report.aiReport=aiText;render();
      }).catch(()=>{
        // Fallback rico por área
        const area=result.area;
        const role=result.role||area;
        state.report.aiReport=`### 💪 Tus fortalezas en IA

Ya estás usando IA en tu trabajo — eso te pone por delante de la mayoría. Completar este assessment demuestra que tienes curiosidad activa, y eso es el primer ingrediente para convertirte en un referente de IA en Viva.

Basado en tus respuestas, tienes claridad sobre qué herramientas existen y cómo podrían aplicarse a tu área de ${area}. Eso es más valioso de lo que parece: muchos equipos fallan en adopción de IA no por falta de herramientas, sino por falta de criterio para elegirlas.

### 🚀 Tu mayor oportunidad

Tu siguiente salto está en pasar de usar IA ocasionalmente a integrarla como un flujo habitual en tu día a día. La diferencia entre alguien que "usa IA" y alguien que "trabaja con IA" es la consistencia y la intención.

En ${area}, hay tareas específicas que hoy toman horas y con los prompts correctos pueden hacerse en minutos: síntesis de información, generación de primeros borradores, análisis de datos, automatización de reportes. El reto no es la herramienta — es construir el hábito y el criterio para saber cuándo y cómo usarla bien.

### 🗺️ Tu plan de desarrollo personalizado

**Paso 1 — Domina el arte del prompting (Semana 1-2)**
Aprende a escribir prompts estructurados con contexto, rol, tarea y formato. Recurso: "Prompt Engineering Guide" en promptingguide.ai (gratuito). Aplícalo esta semana en una tarea real de ${area} — redactar un brief, sintetizar un documento, preparar una presentación.

**Paso 2 — Elige tu herramienta principal y úsala todos los días (Semana 2-4)**
No intentes usar 10 herramientas. Elige una: ChatGPT Plus o Claude Pro. Úsala diario durante 30 días en al menos 3 tareas de tu trabajo real en Viva. El objetivo es que se vuelva tan natural como abrir tu email.

**Paso 3 — Construye tu biblioteca de prompts de ${area} (Mes 2)**
Crea un documento en Notion o Google Docs con tus mejores prompts para las tareas más repetitivas de tu área. Ejemplos: "prompt para redactar un brief de campaña", "prompt para sintetizar resultados", "prompt para proponer ideas de mejora". Esto te ahorrará horas cada semana.

**Paso 4 — Comparte y multiplica (Mes 2-3)**
Organiza una sesión de 30 minutos con tu equipo donde muestres 3 casos de uso reales que ya estés usando. No necesitas ser experto — solo compartir lo que funciona. Esto te posiciona como referente de IA en Viva y acelera la adopción del equipo.

¡Tú puedes liderar este cambio, ${result.name}! La IA no es el futuro de Viva — es el presente, y tú ya estás en el camino. 🚀`;
        render();
      });
    }
  };

  const donBtn=document.getElementById("back-home-done");
  if(donBtn)donBtn.onclick=()=>{state.screen="home";state.area=null;state.answers={};state.report=null;render();};

  const adminPwInput=document.getElementById("admin-pw");
  const adminLogin=document.getElementById("admin-login");
  const adminErr=document.getElementById("admin-err");
  if(adminLogin){
    adminLogin.onclick=()=>{if(adminPwInput.value===ADMIN_PASSWORD){state.adminUnlocked=true;render();}else adminErr.style.display="block";};
    adminPwInput.onkeydown=e=>{if(e.key==="Enter")adminLogin.click();};
  }
  const backAdm=document.getElementById("back-home-admin");
  if(backAdm)backAdm.onclick=()=>{state.screen="home";render();};
  const backAdm2=document.getElementById("back-home-admin2");
  if(backAdm2)backAdm2.onclick=()=>{state.adminUnlocked=false;state.screen="home";render();};
  document.querySelectorAll(".filter-btn").forEach(btn=>{btn.onclick=()=>{state.adminFilter=btn.dataset.filter;render();};});
  const expBtn=document.getElementById("export-btn");
  if(expBtn)expBtn.onclick=exportCSV;
}

render();
</script>
